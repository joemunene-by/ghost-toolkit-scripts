# Ghost Toolkit Configuration File
# Edit these settings to customize your installation

[general]
# Toolkit version
version = "4.0"

# Default output directory for scans
output_dir = ~/ghost_toolkit/scans

# Default payload directory
payload_dir = ~/ghost_toolkit/payloads

# Default report directory
report_dir = ~/ghost_toolkit/reports

# Enable logging
enable_logging = true

# Log file location
log_file = ~/ghost_toolkit/ghost.log

[network]
# Default nmap options
nmap_default = "-T4 -F"

# Default scan rate for masscan
masscan_rate = 1000

# Default wordlist for subdomain enumeration
subdomain_wordlist = /usr/share/wordlists/SecLists/Discovery/DNS/subdomains-top1million-5000.txt

# Default wordlist for directory busting
dirb_wordlist = /usr/share/wordlists/dirb/common.txt

[web]
# Default nikto options
nikto_options = "-h 10"

# SQLMap risk level
sqlmap_risk = 1

# SQLMap verbosity
sqlmap_verbosity = 1

[password]
# Hydra default threads
hydra_threads = 16

# Default wordlist
password_wordlist = /usr/share/wordlists/SecLists/Passwords/Leaked-Databases/rockyou.txt

[exploitation]
# Default listener port
default_lport = 4444

# Default listener IP (auto-detect if empty)
default_lhost = ""

# msfvenom default format
msfvenom_format = elf

[forensics]
# Default volatility profile (auto-detect if empty)
volatility_profile =

# Strings minimum length
strings_min = 4

[defense]
# Process monitor refresh interval (seconds)
procmon_interval = 2

# Log watcher refresh interval (seconds)
logwatch_interval = 1

# File integrity check baseline
integrity_baseline = ~/.ghost_integrity_baseline.txt

[tools]
# Tool installation paths (leave empty for system default)
nmap_path =
msf_path =
sqlmap_path =

# Auto-update tools on startup
auto_update = false

[appearance]
# Launcher color theme (dark/light)
theme = dark

# Show ASCII art banner
show_banner = true

# Confirm before running destructive commands
confirm_destructive = true
