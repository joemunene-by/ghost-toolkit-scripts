name: Ghost Toolkit CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify structure
        run: ls -la tools/
      
      - name: Count tools
        run: echo "Found $(find tools -name '*.sh' | wc -l) tools"
