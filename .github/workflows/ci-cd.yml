name: Ghost Toolkit CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check directories
        run: |
          test -d tools/network
          test -d tools/web
          test -d tools/password
          echo "Directories OK"
      
      - name: Count tools
        run: |
          count=$(find tools -name "*.sh" | wc -l)
          echo "Found $count tools"
