name: Ghost Toolkit CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'  # Weekly at midnight

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Bash
      run: |
        echo "Testing shell scripts..."
    
    - name: Check shell scripts syntax
      run: |
        for f in $(find . -name "*.sh" -type f); do
          echo "Checking $f..."
          bash -n "$f" || { echo "Syntax error in $f"; exit 1; }
        done
    
    - name: Check script permissions
      run: |
        for f in ghost_*.sh tools/**/*.sh; do
          if [ -f "$f" ]; then
            perms=$(stat -c %a "$f" 2>/dev/null || stat -f %A "$f")
            if [ "$perms" != "755" ] && [ "$perms" != "775" ]; then
              echo "Warning: $f may not be executable (permissions: $perms)"
            fi
          fi
        done
    
    - name: Verify directory structure
      run: |
        required_dirs=("tools/network" "tools/web" "tools/password" "tools/exploitation" "tools/forensics" "tools/defense" "tools/utilities")
        for dir in "${required_dirs[@]}"; do
          if [ ! -d "$dir" ]; then
            echo "Error: Missing directory $dir"
            exit 1
          fi
        done
    
    - name: Count tools
      run: |
        tool_count=$(find tools -name "*.sh" -type f | wc -l)
        echo "Total tools: $tool_count"
        if [ "$tool_count" -lt 30 ]; then
          echo "Warning: Expected at least 30 tools"
        fi

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: ghost-toolkit:test
        load: true
    
    - name: Test Docker image
      run: |
        docker run --rm ghost-toolkit:test ls -la ghost_launcher.sh

  security-scan:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Run ShellCheck
      uses: ludeeus/action-shellcheck@master
      with:
        severity: "error"
    
    - name: Check for secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD

  update-readme-stats:
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Update README stats
      run: |
        tool_count=$(find tools -name "ghost_*.sh" -type f | wc -l)
        echo "## \U0001F6E0\uFE0F Toolkit Statistics" > stats.md
        echo "- **Total Tools:** $tool_count" >> stats.md
        echo "- **Last Updated:** $(date)" >> stats.md
        cat stats.md
    
    - name: Commit stats
      run: |
        git config --local user.email "github-actions@github.com"
        git config --local user.name "GitHub Actions"
        git add stats.md
        git commit -m "docs: update toolkit statistics" || echo "No changes to commit"

  notify:
    runs-on: ubuntu-latest
    needs: [test, docker-build, security-scan]
    if: always()
    
    steps:
    - name: Summary
      run: |
        echo "## Ghost Toolkit CI Results" 
        echo "\u2705 Tests: ${{ needs.test.result }}"
        echo "\u2705 Docker: ${{ needs.docker-build.result }}"
        echo "\u2705 Security: ${{ needs.security-scan.result }}"
