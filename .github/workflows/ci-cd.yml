name: Ghost Toolkit CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Check shell scripts syntax
      run: |
        for f in $(find . -name "*.sh" -type f); do
          bash -n "$f"
        done
        echo "✅ All shell scripts syntax OK"
    
    - name: Verify directory structure
      run: |
        dirs=("tools/network" "tools/web" "tools/password" "tools/exploitation" "tools/forensics" "tools/defense" "tools/utilities")
        for d in "${dirs[@]}"; do
          if [ ! -d "$d" ]; then
            echo "❌ Missing: $d"
            exit 1
          fi
        done
        echo "✅ Directory structure OK"
    
    - name: Count tools
      run: |
        count=$(find tools -name "*.sh" -type f | wc -l)
        echo "Found $count tools"
        if [ "$count" -lt 30 ]; then
          exit 1
        fi

  docker:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: ghost-toolkit:test
        load: true
    
    - name: Verify Docker build
      run: |
        docker run --rm ghost-toolkit:test ls ghost_launcher.sh
        echo "✅ Docker build OK"
