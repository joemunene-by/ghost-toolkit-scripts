name: Ghost Toolkit CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'  # Weekly at midnight

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Check shell scripts syntax
      run: |
        for f in $(find . -name "*.sh" -type f); do
          echo "Checking $f..."
          bash -n "$f" || { echo "Syntax error in $f"; exit 1; }
        done
    
    - name: Verify directory structure
      run: |
        required_dirs=("tools/network" "tools/web" "tools/password" "tools/exploitation" "tools/forensics" "tools/defense" "tools/utilities")
        for dir in "${required_dirs[@]}"; do
          if [ ! -d "$dir" ]; then
            echo "Error: Missing directory $dir"
            exit 1
          fi
        done
        echo "✅ Directory structure verified"
    
    - name: Count tools
      run: |
        tool_count=$(find tools -name "*.sh" -type f | wc -l)
        echo "Total tools: $tool_count"
        if [ "$tool_count" -lt 30 ]; then
          echo "Warning: Expected at least 30 tools"
          exit 1
        fi

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: ghost-toolkit:test
        load: true
    
    - name: Test Docker image
      run: |
        docker run --rm ghost-toolkit:test ls -la ghost_launcher.sh

  lint:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install ShellCheck
      run: |
        sudo apt-get update
        sudo apt-get install -y shellcheck
    
    - name: Run ShellCheck
      run: |
        find . -name "*.sh" -type f -exec shellcheck {} + || true

  notify:
    runs-on: ubuntu-latest
    needs: [test, docker-build, lint]
    if: always()
    
    steps:
    - name: Summary
      run: |
        echo "## Ghost Toolkit CI Results" 
        echo "- Tests: ${{ needs.test.result }}"
        echo "- Docker Build: ${{ needs.docker-build.result }}"  
        echo "- Lint: ${{ needs.lint.result }}"
