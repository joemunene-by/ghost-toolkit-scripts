name: Ghost Toolkit CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Check shell scripts syntax
      run: |
        for f in $(find . -name "*.sh" -type f); do
          bash -n "$f"
        done
        echo "All shell scripts OK"
    
    - name: Verify directories exist
      run: |
        ls -la tools/network tools/web tools/password tools/exploitation tools/forensics tools/defense tools/utilities
        echo "Directories OK"
    
    - name: Count tools
      run: |
        count=$(find tools -name "*.sh" -type f | wc -l)
        echo "Found $count tools"
