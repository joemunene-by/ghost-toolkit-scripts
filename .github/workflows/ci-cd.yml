name: Ghost Toolkit CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify structure
        run: ls -la tools/
      
      - name: Count tools
        run: |
          count=$(find tools -name '*.sh' | wc -l)
          echo "Found $count tools"
      
      - name: Check shell syntax
        run: |
          for f in $(find . -name '*.sh' -type f); do
            bash -n "$f"
          done || true
          echo "Shell check done"
